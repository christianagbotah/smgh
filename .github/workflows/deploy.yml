name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NODE_ENV: production

      - name: Create .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 21098 }}
          script: |
            mkdir -p ${{ secrets.REMOTE_PATH }}
            cat > ${{ secrets.REMOTE_PATH }}/.env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NODE_ENV=production
            ENVEOF

      - name: Deploy files to cPanel
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT || 21098 }}
          TARGET: ${{ secrets.REMOTE_PATH }}
          SOURCE: "./"
          ARGS: "-avz --delete --exclude='node_modules' --exclude='.git' --exclude='.github' --exclude='.env' --exclude='.env.local' --exclude='dev.log'"
          SCRIPT_AFTER: |
            cd ${{ secrets.REMOTE_PATH }}
            npm install --production
            npx prisma generate

      - name: Restart Node.js app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 21098 }}
          script: |
            # Restart via cPanel's Passenger/phusion or touch tmp/restart.txt
            touch ${{ secrets.REMOTE_PATH }}/tmp/restart.txt 2>/dev/null || true
            # Also try cPanel's uapi to restart
            /usr/bin/uapi --user=${{ secrets.SSH_USER }} PassengerApps restart domain=${{ secrets.SSH_DOMAIN }} 2>/dev/null || true
